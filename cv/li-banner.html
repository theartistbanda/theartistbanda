<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="fonts/fonts.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1584px; height: 396px; overflow: hidden; }
  body {
    background: #0F0D0B; color: #EDEAE4;
    font-family: 'Inter Tight', sans-serif;
    position: relative;
  }
  /* subtle grid hairlines */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(237,234,228,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(237,234,228,0.045) 1px, transparent 1px);
    background-size: 132px 132px;
  }
  .frame {
    position: absolute; inset: 18px;
    border: 1px solid rgba(237,234,228,0.13);
  }
  .mono { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; }
  /* photo sits bottom-left on desktop: keep content right of 420px */
  .content {
    position: absolute; left: 430px; right: 64px; top: 0; bottom: 0;
    display: flex; flex-direction: column; justify-content: center; gap: 26px;
  }
  .top-line { display: flex; justify-content: space-between; align-items: center; }
  .top-line .mono { font-size: 15px; color: #8C8680; }
  .top-line .dot { color: #E05320; }
  h1 {
    font-weight: 500; font-size: 64px; line-height: 1.04; letter-spacing: -0.035em;
  }
  h1 em { font-style: italic; font-weight: 400; color: #E05320; }
  .block { display: inline-block; width: 46px; height: 38px; background: #E05320; margin-left: 4px; }
  .bottom-line { display: flex; gap: 28px; align-items: center; }
  .bottom-line .mono { font-size: 14.5px; color: #9A948D; }
  .bottom-line .sep { color: #E05320; }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="frame"></div>
  <div class="content">
    <div class="top-line">
      <span class="mono"><span class="dot">●</span>&nbsp; Lead Product Designer</span>
      <span class="mono">dipeshgurav.com</span>
    </div>
    <h1>Designing for the humans<br>behind the <em>pixels.</em><span class="block"></span></h1>
    <div class="bottom-line">
      <span class="mono">Enterprise AI · 35K daily users</span>
      <span class="mono sep">/</span>
      <span class="mono">1M+ downloads shipped</span>
      <span class="mono sep">/</span>
      <span class="mono">12 years of craft</span>
    </div>
  </div>
</body>
</html>
